<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="Consolas, monospace" font-size="14">
  <style>
    .wire { stroke: #2c3e50; stroke-width: 2; fill: none; }
    .wire-high { stroke: #27ae60; stroke-width: 3; fill: none; }
    .wire-low { stroke: #e74c3c; stroke-width: 2; fill: none; }
    .gate { fill: #ecf0f1; stroke: #2c3e50; stroke-width: 2; }
    .pin-text { font-size: 13px; font-weight: bold; }
    .label { font-size: 14px; font-weight: bold; fill: #2c3e50; }
    .value { font-size: 12px; }
    .switch-on { fill: #27ae60; stroke: #1e8449; stroke-width: 2; }
    .switch-off { fill: #e74c3c; stroke: #c0392b; stroke-width: 2; }
    .led-on { fill: #f1c40f; stroke: #f39c12; stroke-width: 2; }
    .led-off { fill: #bdc3c7; stroke: #95a5a6; stroke-width: 2; }
    .led-glow { fill: #f1c40f; opacity: 0.3; }
  </style>

  <!-- TÍTULO -->
  <text x="400" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50">Circuito do Alarme — S = (T NAND H) NAND (T NAND J) — Estado ATIVO (S=1)</text>

  <!-- SWITCH T -->
  <rect x="30" y="65" width="60" height="30" rx="4" class="switch-on"/>
  <text x="60" y="84" text-anchor="middle" class="label" fill="white">T=1</text>
  <text x="30" y="110" class="value" fill="#27ae60">saída: 1</text>

  <!-- SWITCH H -->
  <rect x="30" y="145" width="60" height="30" rx="4" class="switch-off"/>
  <text x="60" y="164" text-anchor="middle" class="label" fill="white">H=0</text>
  <text x="30" y="190" class="value" fill="#e74c3c">saída: 0</text>

  <!-- SWITCH J -->
  <rect x="30" y="225" width="60" height="30" rx="4" class="switch-on"/>
  <text x="60" y="244" text-anchor="middle" class="label" fill="white">J=1</text>
  <text x="30" y="270" class="value" fill="#27ae60">saída: 1</text>

  <!-- Fios T→NAND1 e T→NAND2 -->
  <path d="M 90 80 L 200 80 L 200 108 L 250 108" class="wire-high"/>
  <path d="M 200 80 L 200 238 L 250 238" class="wire-high"/>
  <text x="210" y="75" class="value" fill="#27ae60">1</text>
  <text x="210" y="233" class="value" fill="#27ae60">1</text>

  <!-- Fio H→NAND1 -->
  <path d="M 90 160 L 200 160 L 200 132 L 250 132" class="wire-low"/>
  <text x="210" y="155" class="value" fill="#e74c3c">0</text>

  <!-- Fio J→NAND2 -->
  <path d="M 90 240 L 250 262" class="wire-high"/>
  <text x="200" y="255" class="value" fill="#27ae60">1</text>

  <!-- NAND 1 -->
  <path d="M 250 85 L 320 85 L 320 135 L 250 135 Z" class="gate"/>
  <circle cx="320" cy="110" r="3" fill="#2c3e50"/>
  <text x="260" y="117" class="pin-text">&amp;</text>
  <line x1="290" y1="105" x2="290" y2="105" stroke="#2c3e50" stroke-width="2"/>
  <text x="285" y="108" class="pin-text" font-size="10">○</text>
  <text x="335" y="114" class="value" fill="#27ae60">saída: 1</text>

  <!-- NAND 2 -->
  <path d="M 250 240 L 320 240 L 320 285 L 250 285 Z" class="gate"/>
  <circle cx="320" cy="262" r="3" fill="#2c3e50"/>
  <text x="260" y="270" class="pin-text">&amp;</text>
  <line x1="290" y1="258" x2="290" y2="258" stroke="#2c3e50" stroke-width="2"/>
  <text x="285" y="261" class="pin-text" font-size="10">○</text>
  <text x="335" y="266" class="value" fill="#e74c3c">saída: 0</text>

  <!-- Fio NAND1→NAND3 -->
  <path d="M 323 110 L 400 110 L 400 185 L 450 185" class="wire-high"/>
  <text x="410" y="105" class="value" fill="#27ae60">1</text>

  <!-- Fio NAND2→NAND3 -->
  <path d="M 323 262 L 380 262 L 380 205 L 450 205" class="wire-low"/>
  <text x="390" y="255" class="value" fill="#e74c3c">0</text>

  <!-- NAND 3 -->
  <path d="M 450 165 L 520 165 L 520 210 L 450 210 Z" class="gate"/>
  <circle cx="520" cy="187" r="3" fill="#2c3e50"/>
  <text x="460" y="195" class="pin-text">&amp;</text>
  <line x1="490" y1="183" x2="490" y2="183" stroke="#2c3e50" stroke-width="2"/>
  <text x="485" y="186" class="pin-text" font-size="10">○</text>
  <text x="535" y="191" class="value" fill="#27ae60">saída: 1</text>

  <!-- Fio NAND3→LED -->
  <path d="M 523 187 L 600 187" class="wire-high"/>
  <text x="590" y="182" class="value" fill="#27ae60">1</text>

  <!-- LED S -->
  <circle cx="630" cy="187" r="22" class="led-glow"/>
  <circle cx="630" cy="187" r="18" class="led-on"/>
  <text x="630" y="192" text-anchor="middle" class="label" fill="#7f8c8d">S</text>
  <text x="630" y="225" text-anchor="middle" class="value" fill="#f39c12">S=1 🔴</text>

  <!-- LEGENDA -->
  <text x="400" y="330" text-anchor="middle" font-size="12" fill="#7f8c8d">T=1, H=0, J=1 → NAND1(T,H)=1, NAND2(T,J)=0 → NAND3(1,0)=1 → Alarme ATIVO</text>
  <text x="400" y="350" text-anchor="middle" font-size="12" fill="#7f8c8d">S = (1 NAND 0) NAND (1 NAND 1) = 1 NAND 0 = 1 ✓</text>

  <text x="400" y="370" text-anchor="middle" font-size="11" fill="#95a5a6">3 portas NAND de 2 entradas — Simulado no Digisim Logic Lab</text>
</svg>
